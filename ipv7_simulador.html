<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPv7 Nexus | v1.4.0 Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050608;
            --panel-bg: rgba(13, 17, 23, 0.85);
            --neon-blue: #00f0ff;
            --neon-purple: #b500ff;
            --neon-red: #ff2a2a;
            --neon-yellow: #ffde00;
            --neon-green: #00ff66;
            --neon-orange: #ff8c00;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --border: rgba(48, 54, 61, 0.6);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        #sidebar {
            width: 380px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.8);
            z-index: 10;
            backdrop-filter: blur(20px);
        }

        h1 { 
            font-size: 1.5rem; 
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 5px 0; 
            font-weight: 700;
        }

        .subtitle { 
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem; 
            color: var(--text-dim);
            margin-bottom: 25px; 
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .badges {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.3);
            color: var(--neon-blue);
        }

        .badge.pqc { background: rgba(181, 0, 255, 0.1); border-color: rgba(181, 0, 255, 0.3); color: var(--neon-purple); }
        .badge.kernel { background: rgba(255, 42, 42, 0.1); border-color: rgba(255, 42, 42, 0.3); color: var(--neon-red); }
        .badge.hal { background: rgba(255, 222, 0, 0.1); border-color: rgba(255, 222, 0, 0.3); color: var(--neon-yellow); }
        .badge.bridge { background: rgba(0, 255, 102, 0.1); border-color: rgba(0, 255, 102, 0.3); color: var(--neon-green); }

        .control-group { margin-bottom: 15px; }
        
        label { 
            display: block; 
            font-size: 0.8rem; 
            margin-bottom: 8px; 
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .node-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .did-text {
            color: var(--neon-blue);
            word-break: break-all;
        }

        .btn {
            background: linear-gradient(45deg, #0d1117, #161b22);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .btn:hover:not(:disabled) { 
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            border-color: var(--neon-blue);
        }

        .btn.priority:hover:not(:disabled) {
            box-shadow: 0 0 15px rgba(255, 42, 42, 0.2);
            border-color: var(--neon-red);
        }

        .btn.mqtt:hover:not(:disabled) {
            box-shadow: 0 0 15px rgba(255, 140, 0, 0.2);
            border-color: var(--neon-orange);
        }

        .btn.coap:hover:not(:disabled) {
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.2);
            border-color: var(--neon-green);
        }

        .btn:disabled { 
            opacity: 0.4; 
            cursor: not-allowed; 
        }

        .status-console {
            background: #010409;
            border-radius: 6px;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            border: 1px solid var(--border);
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 10px;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }

        .log-entry { margin-bottom: 5px; }
        .log-entry .timestamp { color: var(--text-dim); margin-right: 8px; }
        .log-entry.quantum { color: var(--neon-purple); }
        .log-entry.priority { color: var(--neon-red); }
        .log-entry.standard { color: var(--neon-blue); }
        .log-entry.mqtt { color: var(--neon-orange); }
        .log-entry.coap { color: var(--neon-green); }
        .log-entry.nat { color: var(--neon-yellow); }

        #network-canvas {
            flex-grow: 1;
            background: radial-gradient(circle at 50% 50%, #0d1117 0%, #010409 100%);
            cursor: crosshair;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h1>IPv7-IEU Nexus</h1>
    <div class="subtitle">v1.4.0-Universal | Universal Interop</div>
    
    <div class="badges">
        <div class="badge">Web3 DIDs</div>
        <div class="badge pqc">ML-DSA-65</div>
        <div class="badge hal">Multi-OS HAL</div>
        <div class="badge bridge">IoT Bridges</div>
        <div class="badge kernel">STUN/NAT</div>
    </div>

    <div class="control-group">
        <label>Origen (Nodo Local)</label>
        <div class="node-box" id="origin-box">Esperando selección Kademlia...</div>
        
        <label>Destino (MicroDHT)</label>
        <div class="node-box" id="target-box">Esperando objetivo P2P...</div>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 5px;">
        <button id="send-bulk-btn" class="btn" disabled>Enrutamiento Base</button>
        <button id="send-prio-btn" class="btn priority" disabled>Micro-Slicing</button>
    </div>
    <div style="display: flex; gap: 10px; margin-bottom: 5px;">
        <button id="send-mqtt-btn" class="btn mqtt" disabled>MQTT Bridge</button>
        <button id="send-coap-btn" class="btn coap" disabled>CoAP Proxy</button>
    </div>

    <label style="margin-top: 15px;">📡 Kernel & Bridge Logs</label>
    <div id="log" class="status-console"></div>
</div>

<canvas id="network-canvas"></canvas>

<script>
    const canvas = document.getElementById('network-canvas');
    const ctx = canvas.getContext('2d');
    const log = document.getElementById('log');
    
    let nodes = [];
    let connections = [];
    let selectedOrigin = null;
    let selectedTarget = null;
    let packets = [];

    // Función para formatear logs al estilo consola hacker
    function addToLog(msg, type = 'standard') {
        const div = document.createElement('div');
        div.className = `log-entry ${type}`;
        const time = new Date().toISOString().split('T')[1].substring(0,8);
        div.innerHTML = `<span class="timestamp">[${time}]</span> ${msg}`;
        log.prepend(div);
    }

    class Node {
        constructor(x, y, index) {
            this.x = x;
            this.y = y;
            this.index = index;
            // Ecuación inyectiva simulada e^(ln(r)+ln(s)+ln(d))
            const rawVal = Math.exp(Math.log(Math.random()*10+1) + Math.log(Math.random()*50+1)).toFixed(2);
            // Generación de Identidad Descentralizada Web3
            this.did = `did:ipv7:${btoa(rawVal).substring(0, 8)}`.toLowerCase();
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, 6, 0, Math.PI * 2);
            
            if (selectedOrigin === this) {
                ctx.fillStyle = '#00f0ff';
                ctx.shadowColor = '#00f0ff';
                ctx.shadowBlur = 20;
            } else if (selectedTarget === this) {
                ctx.fillStyle = '#ff2a2a';
                ctx.shadowColor = '#ff2a2a';
                ctx.shadowBlur = 20;
            } else {
                ctx.fillStyle = '#30363d';
                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
            }
            ctx.fill();
            
            ctx.fillStyle = 'rgba(240, 246, 252, 0.5)';
            ctx.font = '10px "JetBrains Mono"';
            ctx.fillText(this.did, this.x + 12, this.y + 4);
        }
    }

    class Packet {
        constructor(startNode, endNode, type) {
            this.currentX = startNode.x;
            this.currentY = startNode.y;
            this.targetNode = endNode;
            this.type = type; // 'bulk', 'priority', 'quantum', 'mqtt', 'coap', 'nat'
            this.progress = 0;
            
            // Lógica de Slicing y Velocidades
            switch(type) {
                case 'priority': this.speed = 0.08; break; // Sub-milisegundo 6G
                case 'quantum': this.speed = 0.02; break; // Baliza Pesada OOB (3KB)
                case 'nat': this.speed = 0.15; break; // Hole punch (inmediato)
                case 'mqtt': this.speed = 0.04; break;
                case 'coap': this.speed = 0.05; break;
                default: this.speed = 0.03; break; // Tráfico masivo normal
            }
        }

        update() {
            this.progress += this.speed;
            if (this.progress >= 1) return true;
            return false;
        }

        draw() {
            const nextX = this.currentX + (this.targetNode.x - this.currentX) * this.progress;
            const nextY = this.currentY + (this.targetNode.y - this.currentY) * this.progress;
            
            ctx.beginPath();
            ctx.arc(nextX, nextY, (this.type === 'quantum') ? 4 : (this.type === 'nat') ? 2 : 3, 0, Math.PI * 2);
            
            if (this.type === 'priority') {
                ctx.fillStyle = '#ff2a2a';
                ctx.shadowColor = '#ff2a2a';
            } else if (this.type === 'quantum') {
                ctx.fillStyle = '#b500ff';
                ctx.shadowColor = '#b500ff';
            } else if (this.type === 'mqtt') {
                ctx.fillStyle = '#ff8c00';
                ctx.shadowColor = '#ff8c00';
            } else if (this.type === 'coap') {
                ctx.fillStyle = '#00ff66';
                ctx.shadowColor = '#00ff66';
            } else if (this.type === 'nat') {
                ctx.fillStyle = '#ffde00';
                ctx.shadowColor = '#ffde00';
            } else {
                ctx.fillStyle = '#00f0ff';
                ctx.shadowColor = '#00f0ff';
            }
            
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Trail effects
            ctx.beginPath();
            ctx.moveTo(this.currentX, this.currentY);
            ctx.lineTo(nextX, nextY);
            ctx.strokeStyle = ctx.fillStyle;
            ctx.lineWidth = this.type === 'quantum' ? 2 : 1;

            if(this.type === 'nat') ctx.setLineDash([2, 2]); // Línea intermitente para Hole-Punching
            else ctx.setLineDash([]);
            
            ctx.globalAlpha = (this.type === 'nat') ? 0.8 : 0.3;
            ctx.stroke();
            ctx.globalAlpha = 1.0;
            ctx.setLineDash([]); 
        }
    }

    function init() {
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        for (let i = 0; i < 20; i++) {
            nodes.push(new Node(
                Math.random() * (canvas.width - 200) + 100,
                Math.random() * (canvas.height - 100) + 50,
                i
            ));
        }

        // Web estocástica
        for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
                if (Math.random() > 0.85) {
                    connections.push([nodes[i], nodes[j]]);
                }
            }
        }

        addToLog("Iniciando HAL IPv7 v1.4.0-Universal", "standard");
        addToLog("Resolviendo STUN (NAT Traversal activo)", "nat");
        addToLog("MicroDHT Kademlia activo.", "standard");
        addToLog("MQTT Bridge escuchando en memoria", "mqtt");
        addToLog("CoAP Proxy cargado (Puerto 5683)", "coap");

        // Rutina Asíncrona de Balizas Cuánticas OOB (Cada 6 seg en simulador)
        setInterval(() => {
            const origin = nodes[Math.floor(Math.random() * nodes.length)];
            const target = nodes[Math.floor(Math.random() * nodes.length)];
            if (origin !== target) {
                packets.push(new Packet(origin, target, 'quantum'));
                addToLog(`Handshake OOB PQC | FIPS204 ML-DSA-65 -> ${target.did.substring(9,13)}`, "quantum");
            }
        }, 6000);

        // Rutina Asíncrona de STUN Hole-Punching
        setInterval(() => {
            const origin = nodes[Math.floor(Math.random() * nodes.length)];
            const target = nodes[Math.floor(Math.random() * nodes.length)];
            if (origin !== target && Math.random() > 0.5) {
                packets.push(new Packet(origin, target, 'nat'));
                // Silencioso en log a menos que sea necesario, no llenemos la consola
            }
        }, 2500);

        animate();
    }

    function resizeCanvas() {
        canvas.width = window.innerWidth - 380;
        canvas.height = window.innerHeight;
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Dibujar Conexiones
        ctx.strokeStyle = 'rgba(48, 54, 61, 0.4)';
        ctx.lineWidth = 1;
        connections.forEach(conn => {
            ctx.beginPath();
            ctx.moveTo(conn[0].x, conn[0].y);
            ctx.lineTo(conn[1].x, conn[1].y);
            ctx.stroke();
        });

        nodes.forEach(node => node.draw());

        packets = packets.filter(p => {
            const arrived = p.update();
            p.draw();
            if (arrived) {
                if(p.type === 'priority') addToLog(`Micro-Burst <128b entregado en Latencia Nula a ${p.targetNode.did}`, "priority");
                else if(p.type === 'bulk') addToLog(`Bulk de Datos transferido a ${p.targetNode.did}`, "standard");
                else if(p.type === 'mqtt') addToLog(`Broker MQTT -> IEU a nodo ${p.targetNode.did}`, "mqtt");
                else if(p.type === 'coap') addToLog(`Sensores IoT (CoAP v1) leídos desde ${p.targetNode.did}`, "coap");
                else if(p.type === 'nat') {
                    if(Math.random() > 0.9) addToLog(`NAT Firewal perforado por STUN (${p.targetNode.did})`, "nat");
                }
            }
            return !arrived;
        });

        requestAnimationFrame(animate);
    }

    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        nodes.forEach(node => {
            const dist = Math.hypot(node.x - mouseX, node.y - mouseY);
            if (dist < 15) {
                if (!selectedOrigin) {
                    selectedOrigin = node;
                    document.getElementById('origin-box').innerHTML = `<span class="did-text">${node.did}</span>`;
                    addToLog(`Nodo Anclado a DHT Local: ${node.did}`, "standard");
                } else {
                    selectedTarget = node;
                    document.getElementById('target-box').innerHTML = `<span class="did-text">${node.did}</span>`;
                    addToLog(`Resolviendo DLT Estocástico destino: ${node.did}`, "standard");
                    
                    document.getElementById('send-bulk-btn').disabled = false;
                    document.getElementById('send-prio-btn').disabled = false;
                    document.getElementById('send-mqtt-btn').disabled = false;
                    document.getElementById('send-coap-btn').disabled = false;
                }
            }
        });
    });

    document.getElementById('send-bulk-btn').addEventListener('click', () => {
        if (selectedOrigin && selectedTarget) {
            packets.push(new Packet(selectedOrigin, selectedTarget, 'bulk'));
            addToLog(`Cola TCP Fallback / Bulk UDP en proceso...`, "standard");
        }
    });

    document.getElementById('send-prio-btn').addEventListener('click', () => {
        if (selectedOrigin && selectedTarget) {
            packets.push(new Packet(selectedOrigin, selectedTarget, 'priority'));
            addToLog(`Cola RAM Asíncrona: Empujando ACK Prioritario.`, "priority");
        }
    });

    document.getElementById('send-mqtt-btn').addEventListener('click', () => {
        if (selectedOrigin && selectedTarget) {
            packets.push(new Packet(selectedOrigin, selectedTarget, 'mqtt'));
            addToLog(`Publicando Tópico IEU vía MQTT a ${selectedTarget.did.substring(9,13)}`, "mqtt");
        }
    });

    document.getElementById('send-coap-btn').addEventListener('click', () => {
        if (selectedOrigin && selectedTarget) {
            packets.push(new Packet(selectedOrigin, selectedTarget, 'coap'));
            addToLog(`Proxy UDP CoAP transmitiendo ráfaga pequeña a ${selectedTarget.did.substring(9,13)}`, "coap");
        }
    });

    // Iniciar simulación al cargar la página
    init();
</script>
</body>
</html>
