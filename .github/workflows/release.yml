name: Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        cache: true

    - name: Run tests
      run: |
        cd core
        go test ./...

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: linux
            ext: .tar.gz
          - os: windows-latest
            target: win
            ext: .exe
          - os: macos-latest
            target: mac
            ext: .dmg

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        cache: true

    - name: Build Go binary
      run: |
        cd core
        if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
          go build -o ../ipv7 main.go security_linux.go embed_linux.go updater.go
        elif [ "${{ matrix.os }}" == "windows-latest" ]; then
          go build -o ../ipv7.exe main.go security_windows.go embed_windows.go updater.go
        elif [ "${{ matrix.os }}" == "macos-latest" ]; then
          go build -o ../ipv7 main.go security_darwin.go embed_darwin.go updater.go
        fi
      shell: bash

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json

    - name: Install UI dependencies
      run: |
        cd ui
        npm ci

    - name: Build UI
      run: |
        cd ui
        npm run build

    - name: Build Electron app
      run: |
        cd ui
        npm run dist
      env:
        CSC_LINK: ${{ secrets.CSC_LINK }}
        CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

    - name: Upload Go binary
      uses: actions/upload-artifact@v4
      with:
        name: ipv7-${{ matrix.target }}
        path: |
          ipv7
          ipv7.exe

    - name: Generate checksums
      run: |
        sha256sum ipv7* FluxVPN* > SHA256SUMS.txt || true
      shell: bash

    - name: Upload checksums
      uses: actions/upload-artifact@v4
      with:
        name: checksums
        path: SHA256SUMS.txt

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ipv7-linux/ipv7
          ipv7-win/ipv7.exe
          ipv7-mac/ipv7
          fluxvpn-ui-linux/**/*
          fluxvpn-ui-win/**/*
          fluxvpn-ui-mac/**/*
          checksums/SHA256SUMS.txt
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}